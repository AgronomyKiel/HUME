project:
  type: website
  execute-dir: project
  output-dir: docs


author: "Agronomy and Crop Science Group, Kiel University"

website:
  title: "Hume Documentation"
  sidebar:
    style: "docked"
    search: true
    contents:
      - text: "Introduction"
        href: index.qmd
      - section: "Code basis"
        contents:
          - CodeBasisOverview.qmd
      - section: "Sub-models/components"
        contents:
          - section: "Soil water balance"
            contents:
              - Components/Evapotranspiration/Documentation/TPenMonteith.qmd
              - Components/Soil/Documentation/Documentation/TSoilTexture.qmd
              - Components/Soil/Documentation/TSoilWaterModelR.qmd
          - section: "HumeWheat model"
            contents:
              - Components/CERES Wheat/Documentation/TDevelopment.qmd
              - Components/CERES Wheat/Documentation/THumeWheatPartitioning.qmd
              - Components/CERES Wheat/Documentation/THumeWheatLeafArea.qmd
          - section: "HumeOSR model"
            contents:
              - Components/OilseedRape/Documentation/OSR_growth_model.qmd
          - section: "HumeMaize model"
            contents:
              - Components/Maize/Documentation/TMaizeDevelopment.qmd
format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true
    embed-resources: true
chunk_output_type: all

crossref:
  eq-prefix: Eq.
  fig-prefix: Fig.

editor: visual

page-footer:
  right: "Built with [Quarto](https://quarto.org/)"
  left: "&copy; Copyright 2025, Agronomy Group CAU Kiel"

toc: true
toc-expand: 4
toc-depth: 4
toc-location: left
bibliography: bibliography.bibtex.bib
csl: european-journal-of-agronomy.csl

html-math-method: katex
number-sections: true




